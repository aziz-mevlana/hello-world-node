name: Deploy Node App

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Ansible Kurulumu
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: SSH Anahtarini ve Known Hosts Ayarlarini Yapilandir
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Ansible Altyapi Reposunu Cek
        run: git clone git@github.com:aziz-mevlana/configuration-management.git

      - name: Ansible Inventory Dosyasini Olustur
        run: |
          cd configuration-management
          echo "[webservers]" > inventory.ini
          echo "sunucum ansible_host=${{ secrets.SERVER_IP }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini

      - name: Ansible Playbook'u Calistir
        run: |
          cd configuration-management
          ansible-playbook setup.yml -i inventory.ini --tags "app"
